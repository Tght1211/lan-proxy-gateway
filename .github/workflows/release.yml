name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test ./...

      - name: Build all platforms
        run: make build-all

      - name: Smoke test binary commands
        run: |
          ./dist/gateway-linux-amd64 version
          ./dist/gateway-linux-amd64 update --help | grep -q "升级到最新版本"
          ./dist/gateway-linux-amd64 switch --help | grep -q "--region"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
